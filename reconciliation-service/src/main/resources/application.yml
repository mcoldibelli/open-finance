spring:
  application:
    name: reconciliation-service
  config:
    import: "optional:configserver:http://localhost:8888"
  profiles:
    active: local
  batch:
    jdbc:
      initialize-schema: embedded
    job:
      enabled: false
  jpa:
    properties:
      hibernate:
        jdbc:
          batch_size: 500
        order_inserts: true
        order_updates: true


reconciliation:
  files:
    input-path: ${RECONCILIATION_INPUT_PATH:./data/input}
