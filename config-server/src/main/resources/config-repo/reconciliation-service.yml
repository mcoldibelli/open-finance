server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://localhost:5500/reconciliation
    username: reconciliation
    password: ${POSTGRES_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD}
      timeout: 2000ms

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      retries: 3
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true

  jpa:
    properties:
      hibernate:
        jdbc:
          batch_size: 500
        order_inserts: true
        order_updates: true

kafka:
  topics:
    divergences: reconciliation.divergences

reconciliation:
  files:
    input-path: ${RECONCILIATION_INPUT_PATH:./data/input}
  partition:
    thread-pool-size: 4
