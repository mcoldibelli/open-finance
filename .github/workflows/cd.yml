name: CD

on:
  workflow_run:
    workflows: [ "CI" ]
    types: [ completed ]
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/open-finance

jobs:
  build-images:
    name: Build ${{ matrix.service }}
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [ config-server, gateway-service, accounts-service, reconciliation-service ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy-staging:
    name: Deploy staging
    runs-on: ubuntu-latest
    needs: build-images
    environment: staging

    steps:
      - name: Simulate staging deploy
        run: |
          echo "Available images:"
          echo "  ${{ env.IMAGE_PREFIX }}/config-server:${{ github.sha }}"
          echo "  ${{ env.IMAGE_PREFIX }}/gateway-service:${{ github.sha }}"
          echo "  ${{ env.IMAGE_PREFIX }}/accounts-service:${{ github.sha }}"
          echo ""
          echo "Staging deploy finished."
          echo "In real prod: kubectl set image, helm upgrade, etc."

  deploy-prod:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - name: Simulate production deploy
        run: |
          echo "Production deploy with image:"
          echo "  ${{ env.IMAGE_PREFIX }}/gateway-service:${{ github.sha }}"
          echo ""
          echo "Production deploy finished."